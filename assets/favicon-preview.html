<!DOCTYPE html>
<html>
<head>
    <title>Favicon Preview</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .preview {
            text-align: center;
        }
        img {
            width: 128px;
            height: 128px;
            border: 2px solid #ccc;
            border-radius: 8px;
            background: white;
        }
    </style>
</head>
<body>
    <div class="preview">
        <h2>Favicon Preview</h2>
        <img src="favicon.svg" alt="Favicon">
        <p>Your new favicon with initials "EL"</p>
    </div>
</body>
</html>
